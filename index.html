<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SubbieOS — job management for direct-to-builder subbies</title>
<meta name="description" content="Quoting, progress claims, retention and field ops for Australian direct-to-builder subcontractors. In private pilot.">
<style>
  :root{
    --pine:#1E4D3A; --pine-deep:#163C2D; --hivis:#D7E31C;
    --cream:#F5F2E9; --ink:#23251F; --ink-2:#4A4E42; --muted:#7A7E6F;
    --surface:#FFFFFF; --line:#DFDACA;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    background:var(--cream);color:var(--ink);
    min-height:100svh;display:grid;place-items:center;padding:24px;
  }
  main{
    background:var(--surface);border:1px solid var(--line);border-radius:10px;
    box-shadow:0 1px 3px rgba(35,37,31,.06),0 18px 50px rgba(35,37,31,.07);
    max-width:520px;width:100%;padding:48px 40px;text-align:center;
  }
  .mark{display:inline-flex;align-items:flex-end;gap:5px;height:44px;margin-bottom:20px}
  .mark span{width:11px;border-radius:2.5px;background:var(--pine)}
  .mark span:nth-child(1){height:16px;background:var(--hivis)}
  .mark span:nth-child(2){height:28px}
  .mark span:nth-child(3){height:42px}
  h1{font-size:34px;letter-spacing:-.02em;color:var(--pine-deep)}
  .tag{margin-top:12px;font-size:16px;line-height:1.55;color:var(--ink-2)}
  .pill{
    display:inline-block;margin-top:24px;padding:7px 14px;border-radius:999px;
    background:var(--pine);color:var(--cream);
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
    font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  }
  footer{margin-top:36px;font-size:12px;color:var(--muted)}
  @media (prefers-color-scheme:dark){
    body{background:#12140F;color:#EDEBE2}
    main{background:#1A1D16;border-color:#2C3026;box-shadow:none}
    h1{color:#E9F0EA}
    .tag{color:#B9BDAE}
    footer{color:#7A7E6F}
    .mark span{background:#2E7D5B}
    .mark span:nth-child(1){background:var(--hivis)}
  }
</style>
</head>
<body>
<main>
  <div class="mark" aria-hidden="true"><span></span><span></span><span></span></div>
  <h1>SubbieOS</h1>
  <p class="tag">Job management for Australian direct-to-builder subcontractors —
  quoting, progress claims, retention and a money-free field app, with security
  enforced at the database.</p>
  <span class="pill">In private pilot</span>
  <footer>© 2026 SubbieOS · Newcastle, Australia</footer>
</main>
</body>
</html>
